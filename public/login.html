<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — SFS Business Toolkit</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-card {
      background: rgba(15,15,25,0.92);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 1;
    }
    .auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
    .auth-logo .logo-mark {
      background: linear-gradient(135deg, hsl(45,95%,55%), hsl(35,90%,45%));
      color: #0a0a0f;
      font-weight:900; font-size:15px; letter-spacing:1px;
      width:44px; height:44px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
    }
    .auth-logo-text h1 { font-size:18px; font-weight:700; color:var(--text-primary); margin:0; }
    .auth-logo-text p { font-size:12px; color:var(--text-secondary); margin:0; }
    .auth-title { font-size:22px; font-weight:700; color:var(--text-primary); margin:0 0 6px; }
    .auth-sub { font-size:13px; color:var(--text-secondary); margin:0 0 28px; }
    .auth-field { margin-bottom:18px; }
    .auth-field label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:7px; letter-spacing:0.3px; text-transform:uppercase; }
    .auth-field input {
      width:100%; box-sizing:border-box;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      border-radius:9px; padding:11px 14px; color:var(--text-primary);
      font-size:14px; outline:none; transition: border-color .2s;
    }
    .auth-field input:focus { border-color: rgba(212,175,55,0.6); }
    .auth-btn {
      width:100%; padding:13px; border:none; border-radius:10px;
      background:linear-gradient(135deg, hsl(45,95%,60%), hsl(35,85%,45%));
      color:#0a0a0f; font-weight:800; font-size:15px; cursor:pointer;
      margin-top:8px; transition: opacity .2s, transform .1s;
    }
    .auth-btn:hover { opacity:.9; }
    .auth-btn:active { transform: scale(.99); }
    .auth-btn:disabled { opacity:.5; cursor:not-allowed; }
    .auth-switch { text-align:center; font-size:13px; color:var(--text-secondary); margin-top:22px; }
    .auth-switch a { color:hsl(45,90%,60%); text-decoration:none; font-weight:600; }
    .auth-switch a:hover { text-decoration:underline; }
    .auth-error {
      background:rgba(248,81,73,0.12); border:1px solid rgba(248,81,73,0.35);
      border-radius:9px; padding:11px 14px; font-size:13px; color:#f85149;
      margin-bottom:18px; display:none;
    }
  </style>
</head>
<body>
  <canvas id="sfs-circuit"></canvas>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">SFS</div>
      <div class="auth-logo-text">
        <h1>SmartFlow Systems</h1>
        <p>Business Toolkit</p>
      </div>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your account to continue.</p>
    <div class="auth-error" id="login-error"></div>
    <form id="login-form">
      <div class="auth-field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="auth-btn" id="login-btn">Sign In</button>
    </form>
    <div class="auth-switch">
      Don't have an account? <a href="/signup.html">Create one free</a>
    </div>
  </div>
  <script src="sfs-circuit-flow.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("login-error");
      errEl.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Signing in...";

      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        }),
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = "/";
      } else {
        errEl.textContent = data.error || "Login failed.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
